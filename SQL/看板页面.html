<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>租客流向看板</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f7fa;
            padding: 30px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        h1 {
            color: #1a1a2e;
            margin-bottom: 10px;
        }
        .subtitle {
            color: #666;
            margin-bottom: 30px;
        }
        .cards {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 40px;
        }
        .card {
            background: white;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            text-align: center;
        }
        .card h3 {
            color: #666;
            font-size: 14px;
            margin-bottom: 12px;
        }
        .card .number {
            font-size: 42px;
            font-weight: bold;
            color: #1a1a2e;
        }
        .card .unit {
            font-size: 14px;
            color: #888;
        }
        .card1 .number { color: #3b82f6; }
        .card2 .number { color: #10b981; }
        .card3 .number { color: #ef4444; }
        .table-section {
            background: white;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        .table-section h3 {
            margin-bottom: 20px;
            color: #1a1a2e;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            text-align: left;
            padding: 12px;
            border-bottom: 1px solid #e5e7eb;
        }
        th {
            background: #f9fafb;
            font-weight: 600;
            color: #374151;
        }
        .rate-bar {
            background: #e5e7eb;
            border-radius: 10px;
            height: 8px;
            width: 100%;
            overflow: hidden;
        }
        .rate-fill {
            background: #3b82f6;
            height: 100%;
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 租客流向看板</h1>
        <div class="subtitle">租客全生命周期管理 | 数据更新时间：2026年6月</div>

        <div class="cards">
            <div class="card card1">
                <h3>本月到期租客</h3>
                <div class="number">28</div>
                <div class="unit">人</div>
            </div>
            <div class="card card2">
                <h3>续租率</h3>
                <div class="number">67.8</div>
                <div class="unit">%</div>
            </div>
            <div class="card card3">
                <h3>流失率</h3>
                <div class="number">32.2</div>
                <div class="unit">%</div>
            </div>
        </div>

        <div class="table-section">
            <h3>📋 流失原因统计</h3>
            <table>
                <thead>
                    <tr><th>流失原因</th><th>人数</th><th>占比</th></tr>
                </thead>
                <tbody>
                    <tr><td>租金过高</td><td>45</td><td>28.5%<div class="rate-bar"><div class="rate-fill" style="width:28.5%"></div></div></td></tr>
                    <tr><td>服务体验差</td><td>32</td><td>20.3%<div class="rate-bar"><div class="rate-fill" style="width:20.3%"></div></div></td></tr>
                    <tr><td>工作变动</td><td>28</td><td>17.7%<div class="rate-bar"><div class="rate-fill" style="width:17.7%"></div></div></td></tr>
                    <tr><td>房屋质量问题</td><td>24</td><td>15.2%<div class="rate-bar"><div class="rate-fill" style="width:15.2%"></div></div></td></tr>
                    <tr><td>换租其他房源</td><td>18</td><td>11.4%<div class="rate-bar"><div class="rate-fill" style="width:11.4%"></div></div></td></tr>
                    <tr><td>其他</td><td>11</td><td>6.9%<div class="rate-bar"><div class="rate-fill" style="width:6.9%"></div></div></td></tr>
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
