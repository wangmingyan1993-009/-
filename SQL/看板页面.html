<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>租客流向看板</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background: #f0f2f5; }
        .stats { display: flex; gap: 20px; margin-bottom: 30px; }
        .stat-card { flex: 1; background: white; padding: 20px; border-radius: 12px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .stat-number { font-size: 36px; font-weight: bold; color: #3b82f6; }
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background: #f8f9fa; }
        .card { padding: 20px; }
        h1 { margin-bottom: 20px; }
    </style>
</head>
<body>
    <h1>📊 租客流向看板</h1>
    
    <div class="stats">
        <div class="stat-card"><div>📅 本月到期租客</div><div class="stat-number" id="expiringCount">-</div></div>
        <div class="stat-card"><div>📈 续租率</div><div class="stat-number" id="renewalRate">-</div></div>
        <div class="stat-card"><div>📉 流失率</div><div class="stat-number" id="churnRate">-</div></div>
    </div>

    <div class="card">
        <h3>📋 流失原因统计</h3>
        <table id="reasonTable"><thead><tr><th>流失原因</th><th>人数</th><th>占比</th></tr></thead><tbody></tbody></table>
    </div>

    <script>
        fetch('租客数据.json')
            .then(res => res.json())
            .then(data => {
                let lost = 0, renewed = 0, reasons = {};
                data.forEach(r => {
                    let type = r['类型'] || r['type'] || '';
                    let reason = r['问题分类'] || r['流失原因'] || '其他';
                    if (type.includes('流失') || type.includes('中退')) {
                        lost++;
                        reasons[reason] = (reasons[reason] || 0) + 1;
                    } else if (type.includes('续租')) renewed++;
                });
                let total = lost + renewed;
                document.getElementById('renewalRate').innerText = total ? ((renewed/total)*100).toFixed(1)+'%' : '0%';
                document.getElementById('churnRate').innerText = total ? ((lost/total)*100).toFixed(1)+'%' : '0%';
                let tbody = document.querySelector('#reasonTable tbody');
                tbody.innerHTML = '';
                let totalLost = Object.values(reasons).reduce((a,b)=>a+b,0);
                for (let [r,c] of Object.entries(reasons)) {
                    let p = totalLost ? ((c/totalLost)*100).toFixed(1) : 0;
                    tbody.innerHTML += `<tr><td>${r}</td><td>${c}</td><td>${p}%</td></tr>`;
                }
            }).catch(e => { document.body.innerHTML += '<p style="color:red">数据加载失败</p>'; });
    </script>
</body>
</html>
